name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: TypeScript Compile Check
      run: npx tsc --noEmit
      
    - name: ESLint Check
      run: npm run lint
      
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
      
    - name: Run Unit Tests
      run: npm run test
      
    - name: Run Playwright E2E Tests
      env:
        MOCK_DB: 'true'
      run: npx playwright test
